<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Dispatch Order Entry</title>

        <link rel="stylesheet" href="../CSS/dispatchOrder.css?v=1">
    </head>

    <body>

        <div class="container">
            <header class="page-header">
                <h1>Logistic and Dispatch Management System</h1>
                <h2>Dispatch Order Transaction Entry</h2>
            </header>

            <main class="form-wrap">
                <form id="dispatch-order-form" class="dispatch-form">

                    <!-- ── Order ID ── -->
                    <div class="row">
                        <label for="order-id" class="field-label">Order ID : <span class="required">*</span></label>
                        <div class="field-col">
                            <div class="field-inline">
                                <input type="number" id="order-id" class="field-input small" style="width: 150px;" />
                                <div class="btn-group-inline">
                                    <div class="mode-toggle" id="mode-toggle">
                                        <input type="radio" name="form-mode" id="mode-find" value="find" checked />
                                        <label for="mode-find">Find</label>
                                        <input type="radio" name="form-mode" id="mode-new" value="new" />
                                        <label for="mode-new">New</label>
                                        <span class="slider"></span>
                                    </div>
                                    <button type="button" class="info-btn" id="mode-info-btn"
                                        title="Find: enter Order ID to search. New: start a fresh entry.">i</button>
                                </div>
                            </div>
                            <!-- Inline alert shown when ID is not found (Find mode) -->
                            <div class="id-alert" id="id-alert" style="display:none;"></div>
                        </div>
                    </div>

                    <!-- ── Customer ID (Foreign Key – dropdown) ── -->
                    <div class="row">
                        <label for="customer-id" class="field-label">Customer : <span class="required">*</span></label>
                        <div class="field-inline">
                            <select id="customer-id" class="field-input large" style="width: 300px;">
                                <option value="">Loading customers...</option>
                            </select>
                        </div>
                    </div>

                    <!-- ── Dispatch Date ── -->
                    <div class="row">
                        <label for="dispatch-date" class="field-label">Dispatch Date : <span class="required">*</span></label>
                        <div class="field-inline">
                            <input type="date" id="dispatch-date" class="field-input medium" style="width: 200px;" />
                        </div>
                    </div>

                    <!-- ── Source ── -->
                    <div class="row">
                        <label for="source" class="field-label">Source : <span class="required">*</span></label>
                        <div class="field-inline">
                            <textarea id="source" class="field-input large textarea-field"
                                placeholder="Enter source / pickup location" style="width: 350px;"></textarea>
                        </div>
                    </div>

                    <!-- ── Destination ── -->
                    <div class="row">
                        <label for="destination" class="field-label">Destination : <span class="required">*</span></label>
                        <div class="field-inline">
                            <textarea id="destination" class="field-input large textarea-field"
                                placeholder="Enter delivery destination" style="width: 350px;"></textarea>
                        </div>
                    </div>

                    <!-- ── Status ── -->
                    <div class="row">
                        <label for="status" class="field-label">Status :</label>
                        <div class="field-inline">
                            <select id="status" class="field-input medium" style="width: 200px;">
                                <option value="Pending">Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                                <option value="Cancelled">Cancelled</option>
                            </select>
                        </div>
                    </div>

                </form>
            </main>

            <!-- ── Action Buttons ── -->
            <div class="row actions">
                <!-- Save / Update on the left group -->
                <div class="btn-group-actions">
                    <button type="button" class="btn btn-save" id="save-btn">
                        <span class="btn-icon"></span> Save
                    </button>
                    <button type="button" class="btn btn-update" id="update-btn">
                         Update
                    </button>
                </div>

                <!-- Navigation group: Previous + Next together -->
                <div class="btn-group-nav">
                    <button type="button" class="btn btn-prev" id="previous-btn">
                        ◀ Previous
                    </button>
                    <button type="button" class="btn btn-next" id="next-btn">
                        Next ▶
                    </button>
                </div>

                <!-- Navigation end-of-list message -->
                <div class="nav-end-msg" id="nav-end-msg" style="display:none;"></div>

                <!-- Exit -->
                <a href="admin-dashboard.html" class="btn btn-exit" id="exit-btn"> Exit</a>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="../JS/dispatchOrder.js?v=2"></script>
    </body>

</html>
