<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Vehicle Registration Form</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="../CSS/style.css">
    </head>

    <body>

        <div class="main-form border rounded-5 p-5 shadow-lg bg-white mx-auto mt-5">
            <div class="row m-0">
                <div class="col p-0">
                    <div class="d-flex justify-content-center mb-2">
                        <h1 class="main-text fw-bold text-white px-4 py-2 rounded-3 text-center fs-3">Logistic and Dispatch</h1>
                    </div>
                    <div class="d-flex justify-content-center mb-4">
                        <h4 class="main-text fw-bold text-white px-3 py-1 rounded-3 text-center fs-5">Vehicle Master Entry</h4>
                    </div>

                    <form id="vehicle-form">

                        <div class="row mb-3 align-items-center">
                            <label for="vehicle-id" class="col-sm-4 col-form-label text-start" style="white-space: nowrap;">Vehicle ID</label>
                            <div class="col-sm-5 d-flex align-items-center gap-2">
                                <input type="number" class="form-control" id="vehicle-id">
                                <button type="button" class="btn btn-outline-secondary btn-sm rounded-circle p-0 d-flex align-items-center justify-content-center" style="width: 30px; height: 30px;" data-bs-toggle="tooltip" title="Enter an existing Vehicle ID only to update. Leave blank to register a new vehicle.">i</button>
                            </div>
                        </div>

                        <div class="row mb-3 align-items-center">
                            <label for="vehicle-number" class="col-sm-4 col-form-label text-start" style="white-space: nowrap;">Vehicle Number <span class="text-danger">*</span></label>
                            <div class="col-sm-6">
                                <input type="text" class="form-control" id="vehicle-number">
                            </div>
                        </div>

                        <div class="row mb-3 align-items-center">
                            <label for="vehicle-type" class="col-sm-4 col-form-label text-start" style="white-space: nowrap;">Vehicle Type <span class="text-danger">*</span></label>
                            <div class="col-sm-6">
                                <select id="vehicle-type" class="form-select">
                                    <option value="">Select Vehicle Type</option>
                                    <option>Truck</option>
                                    <option>Mini Truck</option>
                                    <option>Van</option>
                                    <option>Container</option>
                                    <option>Tempo</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-4 align-items-center">
                            <label for="capacity" class="col-sm-4 col-form-label text-start" style="white-space: nowrap;">Capacity <span class="text-danger">*</span></label>
                            <div class="col-sm-4">
                                <input type="number" class="form-control" id="capacity">
                            </div>
                        </div>

                        <div class="text-center">
                            <button type="button" class="btn btn-primary px-4" id="register-btn">Save</button>
                            <button type="button" class="btn btn-warning px-4 d-none" id="update-btn">Update</button>
                            <button type="button" class="btn btn-outline-dark px-4" id="clear-btn">Clear</button>
                        </div>

                        <div id="prev-next" class="text-center mt-3 d-none">
                            <button type="button" class="btn btn-success me-2" id="previous-btn">◀ Previous</button>
                            <button type="button" class="btn btn-success" id="next-btn">Next ▶</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="../JS/vehicle.js"></script>
        <script>
            const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl);
            });
        </script>
    </body>

</html>
