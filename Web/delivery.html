<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Delivery Registration Form</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="../CSS/style.css">
    </head>

    <body>

        <div class="page-wrapper d-flex align-items-center justify-content-center py-5">
            <div class="page-card shadow-lg rounded-4 p-5 bg-white">
                <div class="hero text-center mb-4">
                    <div class="hero-title">Logistic and Dispatch</div>
                    <div class="hero-subtitle">Delivery Entry Form</div>
                </div>

                <div class="form-card rounded-3 p-4">
                    <form id="delivery-form">
                        <div class="form-row d-flex align-items-center mb-3">
                            <label for="delivery-id" class="form-label">Delivery ID :</label>
                            <div class="input-with-info">
                                <input type="number" class="form-control" id="delivery-id">
                                <button type="button" class="small-btn find-btn" id="find-btn">Find</button>
                                <button type="button" class="small-btn new-btn" id="new-btn">New</button>
                                <button type="button" class="info-btn" tabindex="0" data-bs-toggle="popover" data-bs-trigger="focus" data-bs-placement="right" data-bs-content="Please enter an existing Delivery ID to update a record. Leave this field blank to register a new delivery.">i</button>
                            </div>
                        </div>

                        <div class="form-row d-flex align-items-center mb-3">
                            <label for="order-id" class="form-label">Order ID : <span class="text-danger">*</span></label>
                            <div class="input-with-info">
                                <select class="form-select" id="order-id"></select>
                            </div>
                        </div>

                        <div class="form-row d-flex align-items-center mb-3">
                            <label for="delivery-date" class="form-label">Delivery Date : <span class="text-danger">*</span></label>
                            <div class="input-with-info">
                                <input type="date" class="form-control" id="delivery-date">
                            </div>
                        </div>

                        <div class="form-row d-flex align-items-start mb-3">
                            <label for="remarks" class="form-label">Remarks :</label>
                            <div class="input-with-info">
                                <textarea class="form-control" id="remarks" rows="3"></textarea>
                            </div>
                        </div>

                        <div class="form-row d-flex align-items-center mb-4">
                            <label for="proof" class="form-label">Proof of Delivery :</label>
                            <div class="input-with-info">
                                <input type="text" class="form-control" id="proof">
                            </div>
                        </div>

                        <div class="actions d-flex justify-content-center gap-3">
                            <button type="button" class="pill-btn green" id="register-btn">Register</button>
                            <button type="button" class="pill-btn amber d-none" id="update-btn">Update</button>
                            <div id="prev-next" class="action-pair">
                                <button type="button" class="pill-btn grey" id="previous-btn">Previous</button>
                                <button type="button" class="pill-btn yellow" id="next-btn">Next</button>
                            </div>
                            <button type="button" class="pill-btn light" id="clear-btn">Clear</button>
                            <a href="admin-dashboard.html" class="pill-btn red">Exit</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="../JS/delivery.js"></script>
    </body>

</html>
